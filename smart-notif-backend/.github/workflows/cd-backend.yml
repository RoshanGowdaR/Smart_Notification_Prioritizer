name: CD Backend

on:
  push:
    branches:
      - main
      - feature-backend
  workflow_dispatch:

jobs:
  test-and-package:
    name: Test and Package Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests -q

      - name: Create backend package
        run: |
          mkdir -p artifacts
          tar --exclude='.git' \
              --exclude='.venv' \
              --exclude='__pycache__' \
              --exclude='.pytest_cache' \
              -czf artifacts/backend-${{ github.sha }}.tar.gz .

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-package-${{ github.sha }}
          path: artifacts/backend-${{ github.sha }}.tar.gz
          if-no-files-found: error
